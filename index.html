<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CrashDrive 3D (Prototype)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#0b0f16;font-family:Arial}
    #ui{
      position:fixed; left:12px; top:12px; z-index:10;
      background:rgba(16,24,39,.78); color:#e8f0ff;
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px; padding:10px 12px; backdrop-filter: blur(10px);
      min-width:240px;
    }
    #ui b{font-weight:900}
    .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-top:6px}
    .bar{height:10px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin-top:6px}
    .fill{height:100%;width:100%;transform-origin:left;transform:scaleX(0);
      background:linear-gradient(90deg,#64ff9a,#ffd166,#ff4d4d)}
    .muted{opacity:.8;font-size:12px;line-height:1.35;margin-top:8px}
    button{
      margin-top:8px; width:100%;
      border:none; cursor:pointer; border-radius:12px;
      padding:10px 12px; font-weight:900;
      background:rgba(0,0,0,.35); color:#e8f0ff;
      border:1px solid rgba(255,255,255,.14);
    }
    button:active{transform:translateY(1px)}
    #renderCanvas{width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="ui">
    <div><b>CrashDrive 3D</b></div>
    <div class="row"><span>Speed</span><b id="spd">0</b></div>
    <div class="row"><span>Damage</span><b id="dmg">0%</b></div>
    <div class="bar"><div class="fill" id="dmgFill"></div></div>
    <button id="reset">Reset (R)</button>
    <div class="muted">
      Controls: <b>WASD</b> / arrows • <b>Space</b> handbrake • <b>R</b> reset<br>
      Damage ↑ à chaque choc (déformation “fake”).
    </div>
  </div>

  <!-- Babylon + physics -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/ammo.js"></script>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });

    const spdEl = document.getElementById("spd");
    const dmgEl = document.getElementById("dmg");
    const dmgFill = document.getElementById("dmgFill");
    const resetBtn = document.getElementById("reset");

    let carBody, carMeshes = [], damage = 0;
    let lastImpact = 0;

    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));

    const keys = new Set();
    window.addEventListener("keydown", (e)=>{ keys.add(e.key.toLowerCase()); if(e.key.toLowerCase()==="r") resetCar(); });
    window.addEventListener("keyup", (e)=> keys.delete(e.key.toLowerCase()));

    async function createScene(){
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.03,0.05,0.08,1);

      // Camera
      const camera = new BABYLON.FollowCamera("cam", new BABYLON.Vector3(0,6,-12), scene);
      camera.radius = 14;
      camera.heightOffset = 6;
      camera.rotationOffset = 180;
      camera.cameraAcceleration = 0.08;
      camera.maxCameraSpeed = 6;

      // Light
      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 0.85;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.4,-1,0.3), scene);
      dir.position = new BABYLON.Vector3(30,60,-30);
      dir.intensity = 0.75;

      // Physics
      const ammo = await Ammo();
      const plugin = new BABYLON.AmmoJSPlugin(true, ammo);
      scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), plugin);

      // Ground (big map)
      const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:300, height:300}, scene);
      const gmat = new BABYLON.StandardMaterial("gmat", scene);
      gmat.diffuseColor = new BABYLON.Color3(0.06,0.08,0.12);
      gmat.specularColor = new BABYLON.Color3(0,0,0);
      ground.material = gmat;
      ground.receiveShadows = true;
      ground.physicsImpostor = new BABYLON.PhysicsImpostor(ground, BABYLON.PhysicsImpostor.BoxImpostor,
        { mass:0, restitution:0.05, friction:0.9 }, scene);

      // Obstacles: walls + blocks + ramps
      function wall(x,z,w,d,h=3){
        const m = BABYLON.MeshBuilder.CreateBox("wall", {width:w, depth:d, height:h}, scene);
        m.position.set(x, h/2, z);
        const mat = new BABYLON.StandardMaterial("wmat", scene);
        mat.diffuseColor = new BABYLON.Color3(0.7,0.2,0.22);
        m.material = mat;
        m.physicsImpostor = new BABYLON.PhysicsImpostor(m, BABYLON.PhysicsImpostor.BoxImpostor,
          { mass:0, restitution:0.02, friction:0.8 }, scene);
        return m;
      }
      function block(x,z,s=3){
        const m = BABYLON.MeshBuilder.CreateBox("b", {size:s}, scene);
        m.position.set(x, s/2, z);
        const mat = new BABYLON.StandardMaterial("bmat", scene);
        mat.diffuseColor = new BABYLON.Color3(0.55,0.18,0.18);
        m.material = mat;
        m.physicsImpostor = new BABYLON.PhysicsImpostor(m, BABYLON.PhysicsImpostor.BoxImpostor,
          { mass:0, restitution:0.02, friction:0.85 }, scene);
        return m;
      }
      function ramp(x,z,w=10,d=6,tilt=-18){
        const m = BABYLON.MeshBuilder.CreateBox("r", {width:w, depth:d, height:1}, scene);
        m.position.set(x, 0.5, z);
        m.rotation.x = BABYLON.Tools.ToRadians(tilt);
        const mat = new BABYLON.StandardMaterial("rmat", scene);
        mat.diffuseColor = new BABYLON.Color3(0.20,0.28,0.55);
        m.material = mat;
        m.physicsImpostor = new BABYLON.PhysicsImpostor(m, BABYLON.PhysicsImpostor.BoxImpostor,
          { mass:0, restitution:0.02, friction:0.9 }, scene);
        return m;
      }

      // Outer boundaries
      wall(0,-150,300,4,4); wall(0,150,300,4,4);
      wall(-150,0,4,300,4); wall(150,0,4,300,4);

      // Crash zone blocks
      for(let i=0;i<18;i++){
        block(-60 + (i%6)*10, -40 + Math.floor(i/6)*10, 3.2);
      }

      // Arena + ramps
      wall(60,0,4,80,4); wall(100,0,4,80,4); wall(80,-40,44,4,4); wall(80,40,44,4,4);
      ramp(10, 40, 14, 7, -20);
      ramp(40, -20, 12, 6, -16);
      ramp(90, 70, 16, 8, -22);

      // Car (simple rigidbody + fake deformation)
      const chassis = BABYLON.MeshBuilder.CreateBox("chassis", {width:2.2, height:0.7, depth:4.0}, scene);
      chassis.position.set(0, 2, 0);

      const cmat = new BABYLON.StandardMaterial("cmat", scene);
      cmat.diffuseColor = new BABYLON.Color3(0.95,0.75,0.2);
      cmat.specularColor = new BABYLON.Color3(0.1,0.1,0.1);
      chassis.material = cmat;

      // Wheels (visual)
      const wheelMat = new BABYLON.StandardMaterial("wmat2", scene);
      wheelMat.diffuseColor = new BABYLON.Color3(0.05,0.05,0.05);

      function wheel(x,y,z){
        const w = BABYLON.MeshBuilder.CreateCylinder("wheel", {diameter:0.8, height:0.35, tessellation:18}, scene);
        w.rotation.z = Math.PI/2;
        w.position.set(x,y,z);
        w.material = wheelMat;
        w.parent = chassis;
        return w;
      }
      const w1 = wheel(-1.1, -0.45,  1.4);
      const w2 = wheel( 1.1, -0.45,  1.4);
      const w3 = wheel(-1.1, -0.45, -1.4);
      const w4 = wheel( 1.1, -0.45, -1.4);

      // Bumpers (deform targets)
      const bumperF = BABYLON.MeshBuilder.CreateBox("bf", {width:2.0, height:0.4, depth:0.4}, scene);
      bumperF.position.set(0, -0.1, 2.2);
      bumperF.material = cmat;
      bumperF.parent = chassis;

      const bumperB = BABYLON.MeshBuilder.CreateBox("bb", {width:2.0, height:0.4, depth:0.4}, scene);
      bumperB.position.set(0, -0.1, -2.2);
      bumperB.material = cmat;
      bumperB.parent = chassis;

      // Physics impostor (rigid body)
      chassis.physicsImpostor = new BABYLON.PhysicsImpostor(chassis, BABYLON.PhysicsImpostor.BoxImpostor,
        { mass: 900, restitution:0.02, friction:0.9 }, scene);

      carBody = chassis;
      carMeshes = [chassis, bumperF, bumperB];

      camera.lockedTarget = chassis;

      // Impact -> damage
      const obs = scene.onBeforeRenderObservable.add(() => {
        if(!carBody || !carBody.physicsImpostor) return;

        const v = carBody.physicsImpostor.getLinearVelocity();
        const speed = v ? v.length() : 0;
        spdEl.textContent = Math.round(speed * 3.6) + " km/h";

        // Controls (simple forces)
        const forward = carBody.forward; // direction
        const up = keys.has("w") || keys.has("arrowup");
        const down = keys.has("s") || keys.has("arrowdown");
        const left = keys.has("a") || keys.has("arrowleft");
        const right = keys.has("d") || keys.has("arrowright");
        const hand = keys.has(" ");

        const engineForce = hand ? 0 : 1400;
        const brakeForce = 900;

        if(up){
          carBody.physicsImpostor.applyForce(forward.scale(engineForce), carBody.getAbsolutePosition());
        }
        if(down){
          carBody.physicsImpostor.applyForce(forward.scale(-engineForce*0.75), carBody.getAbsolutePosition());
        }

        // steering: apply torque
        const torque = 90 * (hand ? 0.65 : 1);
        if(left) carBody.physicsImpostor.applyTorque(new BABYLON.Vector3(0, -torque, 0));
        if(right) carBody.physicsImpostor.applyTorque(new BABYLON.Vector3(0, torque, 0));

        // handbrake: damp velocity sideways a bit
        if(hand && v){
          carBody.physicsImpostor.setLinearVelocity(v.scale(0.985));
        }

        // Fake “damage look” based on impacts (detect sudden speed drops)
        const now = performance.now();
        if(now - lastImpact > 120){
          // if speed is high and near ground, small chance to count bumps as impacts via angular vel
          const av = carBody.physicsImpostor.getAngularVelocity();
          const shake = av ? av.length() : 0;
          if(speed > 12 && shake > 3.2){
            lastImpact = now;
            addDamage(speed * 1.2 + shake * 3);
          }
        }
      });

      function addDamage(amount){
        damage = clamp(damage + amount * 0.06, 0, 100);
        dmgEl.textContent = Math.round(damage) + "%";
        dmgFill.style.transform = `scaleX(${damage/100})`;

        // Visual deformation (fake): bumpers get squished + color darkens
        const squash = 1 - (damage/220); // small
        bumperF.scaling.z = clamp(squash, 0.65, 1);
        bumperB.scaling.z = clamp(squash, 0.65, 1);

        const tint = 1 - (damage/180);
        carBody.material.diffuseColor = new BABYLON.Color3(0.95*tint, 0.75*tint, 0.2*tint);
      }

      // Reset
      function resetCar(){
        if(!carBody) return;
        damage = 0;
        dmgEl.textContent = "0%";
        dmgFill.style.transform = "scaleX(0)";
        bumperF.scaling.z = 1;
        bumperB.scaling.z = 1;
        carBody.material.diffuseColor = new BABYLON.Color3(0.95,0.75,0.2);

        carBody.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(0,0,0));
        carBody.physicsImpostor.setAngularVelocity(new BABYLON.Vector3(0,0,0));
        carBody.position.set(0, 2, 0);
        carBody.rotationQuaternion = BABYLON.Quaternion.Identity();
      }
      window.resetCar = resetCar;
      resetBtn.onclick = resetCar;

      return scene;
    }

    let scene;
    createScene().then(s => {
      scene = s;
      engine.runRenderLoop(() => scene.render());
    });

    window.addEventListener("resize", () => engine.resize());
  </script>
</body>
</html>
