<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CrashDrive 3D (No-Physics • Works)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#87ceeb;font-family:Arial}
    #renderCanvas{width:100%;height:100%;touch-action:none;display:block}
    #ui{
      position:fixed;left:14px;top:14px;z-index:10;
      background:rgba(10,14,22,.55);color:#fff;
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;padding:10px 12px;backdrop-filter: blur(10px);
      min-width:280px
    }
    .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-top:6px}
    .bar{height:10px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;margin-top:6px}
    .fill{height:100%;width:100%;transform-origin:left;transform:scaleX(0);
      background:linear-gradient(90deg,#64ff9a,#ffd166,#ff4d4d)}
    .muted{opacity:.9;font-size:12px;line-height:1.35;margin-top:8px}
    button{
      margin-top:8px;width:100%;border:none;cursor:pointer;border-radius:12px;
      padding:10px 12px;font-weight:900;background:rgba(0,0,0,.35);color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }
    button:active{transform:translateY(1px)}
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="ui">
    <div style="font-weight:900;letter-spacing:.2px">CrashDrive 3D ☀️ (WORKING)</div>
    <div class="row"><span>Speed</span><b id="spd">0</b></div>
    <div class="row"><span>Damage</span><b id="dmg">0%</b></div>
    <div class="bar"><div class="fill" id="dmgFill"></div></div>
    <button id="reset">Reset (R)</button>
    <div class="muted">
      <b>W</b> accel • <b>S</b> brake/reverse • <b>A/D</b> turn • <b>Space</b> handbrake<br>
      💥 Chaque choc = damage ↑ + déformation (fake).
    </div>
  </div>

  <!-- Babylon ONLY (no Ammo) -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>

  <script>
  (() => {
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { antialias:true });

    const spdEl = document.getElementById("spd");
    const dmgEl = document.getElementById("dmg");
    const dmgFill = document.getElementById("dmgFill");
    const resetBtn = document.getElementById("reset");

    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const lerp=(a,b,t)=>a+(b-a)*t;

    const keys = new Set();
    window.addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      keys.add(k);
      if(k==="r") resetCar();
    });
    window.addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));

    // ===== Scene
    const scene = new BABYLON.Scene(engine);

    // Sky blue
    scene.clearColor = new BABYLON.Color4(0.53, 0.81, 0.92, 1);

    // Sun + skylight (BRIGHT)
    const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.4, -1, 0.25), scene);
    sun.position = new BABYLON.Vector3(80, 140, -60);
    sun.intensity = 2.6;

    const skyLight = new BABYLON.HemisphericLight("sky", new BABYLON.Vector3(0, 1, 0), scene);
    skyLight.intensity = 1.25;

    // Visible sun disc
    const sunDisc = BABYLON.MeshBuilder.CreateDisc("sunDisc", { radius: 22, tessellation: 64 }, scene);
    sunDisc.position = new BABYLON.Vector3(140, 120, -190);
    sunDisc.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
    const sunMat = new BABYLON.StandardMaterial("sunMat", scene);
    sunMat.emissiveColor = new BABYLON.Color3(1, 0.95, 0.6);
    sunMat.disableLighting = true;
    sunDisc.material = sunMat;

    // Camera follow (smooth)
    const camera = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0, 12, -22), scene);
    camera.setTarget(BABYLON.Vector3.Zero());

    // ===== Ground + road
    const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 800, height: 800 }, scene);
    const gmat = new BABYLON.StandardMaterial("gmat", scene);
    gmat.diffuseColor = new BABYLON.Color3(0.18, 0.55, 0.22);
    gmat.specularColor = new BABYLON.Color3(0,0,0);
    ground.material = gmat;

    const road = BABYLON.MeshBuilder.CreateGround("road", { width: 700, height: 28 }, scene);
    road.position.y = 0.01;
    const rmat = new BABYLON.StandardMaterial("rmat", scene);
    rmat.diffuseColor = new BABYLON.Color3(0.22,0.22,0.24);
    rmat.specularColor = new BABYLON.Color3(0,0,0);
    road.material = rmat;

    // Center line
    const line = BABYLON.MeshBuilder.CreateGround("line", { width: 650, height: 1.2 }, scene);
    line.position.y = 0.02;
    const lmat = new BABYLON.StandardMaterial("lmat", scene);
    lmat.diffuseColor = new BABYLON.Color3(0.95,0.9,0.35);
    lmat.specularColor = new BABYLON.Color3(0,0,0);
    line.material = lmat;

    // ===== Map obstacles (AABB)
    const colliders = [];
    function addBoxCollider(mesh, pad=0){
      mesh.computeWorldMatrix(true);
      const b = mesh.getBoundingInfo().boundingBox;
      colliders.push({ mesh, pad });
      return mesh;
    }
    function makeBox(name, x,z, w,d,h, color){
      const m = BABYLON.MeshBuilder.CreateBox(name, { width:w, depth:d, height:h }, scene);
      m.position.set(x, h/2, z);
      const mat = new BABYLON.StandardMaterial(name+"_mat", scene);
      mat.diffuseColor = BABYLON.Color3.FromHexString(color);
      mat.specularColor = new BABYLON.Color3(0,0,0);
      m.material = mat;
      return m;
    }

    // Big boundaries
    addBoxCollider(makeBox("B1", 0, -390, 800, 8, 8, "#c03b3b"));
    addBoxCollider(makeBox("B2", 0,  390, 800, 8, 8, "#c03b3b"));
    addBoxCollider(makeBox("B3",-390, 0, 8, 800, 8, "#c03b3b"));
    addBoxCollider(makeBox("B4", 390, 0, 8, 800, 8, "#c03b3b"));

    // City blocks (buildings)
    for(let i=0;i<26;i++){
      const bx = -300 + (i%13)*50;
      const bz = -220 + Math.floor(i/13)*220;
      const h = 12 + Math.random()*28;
      addBoxCollider(makeBox("BLD"+i, bx, bz, 34, 34, h, "#a33b3b"), 0.2);
    }

    // Crash test blocks zone
    for(let i=0;i<30;i++){
      const x = -280 + (i%10)*22;
      const z =  120 + Math.floor(i/10)*22;
      addBoxCollider(makeBox("CB"+i, x, z, 10, 10, 10, "#b22a2a"), 0.1);
    }

    // Arena walls
    addBoxCollider(makeBox("W1", 220, 0, 10, 180, 10, "#b22a2a"));
    addBoxCollider(makeBox("W2", 290, 0, 10, 180, 10, "#b22a2a"));
    addBoxCollider(makeBox("W3", 255,-90, 90, 10, 10, "#b22a2a"));
    addBoxCollider(makeBox("W4", 255, 90, 90, 10, 10, "#b22a2a"));

    // Ramps (simple wedge look, collision as box)
    function ramp(x,z,w,d,tiltDeg){
      const m = BABYLON.MeshBuilder.CreateBox("ramp", { width:w, depth:d, height:2 }, scene);
      m.position.set(x, 1, z);
      m.rotation.x = BABYLON.Tools.ToRadians(tiltDeg);
      const mat = new BABYLON.StandardMaterial("rmat2", scene);
      mat.diffuseColor = new BABYLON.Color3(0.25,0.35,0.9);
      mat.specularColor = new BABYLON.Color3(0,0,0);
      m.material = mat;
      addBoxCollider(m, 0.0);
    }
    ramp(60, 70, 36, 18, -18);
    ramp(120,-60, 30, 16, -16);
    ramp(320, 160, 44, 20, -22);

    // ===== Car (kinematic)
    const carRoot = new BABYLON.TransformNode("carRoot", scene);

    const carMat = new BABYLON.StandardMaterial("carMat", scene);
    carMat.diffuseColor = new BABYLON.Color3(0.12, 0.65, 1.0);
    carMat.specularColor = new BABYLON.Color3(0.2,0.2,0.2);

    const chassis = BABYLON.MeshBuilder.CreateBox("chassis", { width:2.6, height:0.7, depth:4.6 }, scene);
    chassis.parent = carRoot;
    chassis.position.y = 1.1;
    chassis.material = carMat;

    const top = BABYLON.MeshBuilder.CreateBox("top", { width:1.9, height:0.6, depth:2.3 }, scene);
    top.parent = carRoot;
    top.position.set(0, 1.55, -0.3);
    top.material = carMat;

    const win = BABYLON.MeshBuilder.CreateBox("win", { width:1.65, height:0.35, depth:1.55 }, scene);
    win.parent = carRoot;
    win.position.set(0, 1.62, -0.3);
    const wmat = new BABYLON.StandardMaterial("wmat", scene);
    wmat.diffuseColor = new BABYLON.Color3(0.05,0.08,0.12);
    wmat.alpha = 0.65;
    win.material = wmat;

    // bumpers for fake damage
    const bumperF = BABYLON.MeshBuilder.CreateBox("bf", { width:2.2, height:0.35, depth:0.5 }, scene);
    bumperF.parent = carRoot;
    bumperF.position.set(0, 0.95, 2.55);
    bumperF.material = carMat;

    const bumperB = BABYLON.MeshBuilder.CreateBox("bb", { width:2.2, height:0.35, depth:0.5 }, scene);
    bumperB.parent = carRoot;
    bumperB.position.set(0, 0.95, -2.55);
    bumperB.material = carMat;

    // wheels
    const wheelMat = new BABYLON.StandardMaterial("wheelMat", scene);
    wheelMat.diffuseColor = new BABYLON.Color3(0.05,0.05,0.05);

    function wheel(x,z){
      const w = BABYLON.MeshBuilder.CreateCylinder("wheel", { diameter:0.9, height:0.35, tessellation:18 }, scene);
      w.rotation.z = Math.PI/2;
      w.parent = carRoot;
      w.position.set(x, 0.65, z);
      w.material = wheelMat;
      return w;
    }
    const wh1 = wheel(-1.15,  1.75);
    const wh2 = wheel( 1.15,  1.75);
    const wh3 = wheel(-1.15, -1.75);
    const wh4 = wheel( 1.15, -1.75);

    // headlights emissive
    function headLight(x,z){
      const s = BABYLON.MeshBuilder.CreateSphere("hl", { diameter:0.22 }, scene);
      s.parent = carRoot;
      s.position.set(x, 0.95, z);
      const m = new BABYLON.StandardMaterial("hlm", scene);
      m.emissiveColor = new BABYLON.Color3(1,1,0.85);
      m.disableLighting = true;
      s.material = m;
    }
    headLight(-0.85, 2.65);
    headLight( 0.85, 2.65);

    // ===== Driving state
    const state = {
      pos: new BABYLON.Vector3(0, 0, 0),
      vel: new BABYLON.Vector3(0, 0, 0),
      yaw: 0,
      yawVel: 0,
      speed: 0,
      damage: 0
    };

    function setDamage(v){
      state.damage = clamp(v, 0, 100);
      dmgEl.textContent = Math.round(state.damage) + "%";
      dmgFill.style.transform = `scaleX(${state.damage/100})`;

      // fake deformation + paint damage
      const squashF = clamp(1 - state.damage/170, 0.70, 1);
      const squashB = clamp(1 - state.damage/190, 0.75, 1);
      bumperF.scaling.z = squashF;
      bumperB.scaling.z = squashB;
      top.scaling.z = clamp(1 - state.damage/220, 0.86, 1);

      const tint = 1 - state.damage/180;
      carMat.diffuseColor = new BABYLON.Color3(0.12*tint, 0.65*tint, 1.0*tint);
    }

    function resetCar(){
      state.pos.set(0,0,0);
      state.vel.set(0,0,0);
      state.yaw = 0;
      state.yawVel = 0;
      setDamage(0);

      carRoot.position.set(0, 0, 0);
      carRoot.rotationQuaternion = BABYLON.Quaternion.FromEulerAngles(0, 0, 0);
    }
    window.resetCar = resetCar;
    resetBtn.onclick = resetCar;

    // ===== Collision helpers (AABB)
    function getAABB(mesh, pad=0){
      mesh.computeWorldMatrix(true);
      const bb = mesh.getBoundingInfo().boundingBox;
      const min = bb.minimumWorld.clone();
      const max = bb.maximumWorld.clone();
      min.x -= pad; min.z -= pad;
      max.x += pad; max.z += pad;
      return {min,max};
    }
    function circleAABBResolve(cx, cz, r, aabb){
      // closest point
      const x = clamp(cx, aabb.min.x, aabb.max.x);
      const z = clamp(cz, aabb.min.z, aabb.max.z);
      const dx = cx - x;
      const dz = cz - z;
      const d2 = dx*dx + dz*dz;
      if(d2 > r*r) return null;
      const d = Math.sqrt(d2) || 0.0001;
      const nx = dx / d;
      const nz = dz / d;
      const push = r - d;
      return { nx, nz, push };
    }

    // ===== Main loop
    const carRadius = 1.7; // collision radius in XZ
    let lastSpeed = 0;

    scene.onBeforeRenderObservable.add(() => {
      const dt = scene.getEngine().getDeltaTime()/1000;

      const up = keys.has("w") || keys.has("arrowup");
      const down = keys.has("s") || keys.has("arrowdown");
      const left = keys.has("a") || keys.has("arrowleft");
      const right = keys.has("d") || keys.has("arrowright");
      const hand = keys.has(" ");

      // Forward dir from yaw
      const fx = Math.sin(state.yaw);
      const fz = Math.cos(state.yaw);

      // Parameters (handbrake changes grip)
      const maxSpeed = 42;        // "km/h-ish feel"
      const accel = hand ? 0 : 26;
      const brake = 24;
      const friction = hand ? 2.6 : 5.2;
      const turn = 2.6;
      const turnAtSpeed = clamp((state.vel.length()/6), 0.2, 1);

      // accelerate
      if(up){
        state.vel.x += fx * accel * dt;
        state.vel.z += fz * accel * dt;
      }
      if(down){
        state.vel.x -= fx * brake * dt;
        state.vel.z -= fz * brake * dt;
      }

      // steering
      let steer = 0;
      if(left) steer -= 1;
      if(right) steer += 1;
      state.yaw += steer * turn * turnAtSpeed * dt;

      // friction / drag
      state.vel.x = lerp(state.vel.x, 0, friction*dt);
      state.vel.z = lerp(state.vel.z, 0, friction*dt);

      // clamp speed
      const sp = Math.hypot(state.vel.x, state.vel.z);
      if(sp > maxSpeed){
        const s = maxSpeed / sp;
        state.vel.x *= s;
        state.vel.z *= s;
      }

      // move
      state.pos.x += state.vel.x * dt;
      state.pos.z += state.vel.z * dt;

      // keep on ground (Y)
      state.pos.y = 0;

      // collisions (resolve + damage)
      let hit = false;
      for(const c of colliders){
        const aabb = getAABB(c.mesh, c.pad);
        const res = circleAABBResolve(state.pos.x, state.pos.z, carRadius, aabb);
        if(!res) continue;

        // push out
        state.pos.x += res.nx * res.push;
        state.pos.z += res.nz * res.push;

        // bounce (reduce velocity)
        const vn = state.vel.x*res.nx + state.vel.z*res.nz;
        if(vn < 0){
          state.vel.x -= (1.6) * vn * res.nx;
          state.vel.z -= (1.6) * vn * res.nz;
          hit = true;
        }
      }

      // damage based on speed drop
      const speedNow = Math.hypot(state.vel.x, state.vel.z);
      const drop = Math.max(0, lastSpeed - speedNow);
      lastSpeed = speedNow;

      if(hit && (drop > 1.2 || speedNow > 16)){
        const add = (drop*8) + (speedNow*0.10);
        setDamage(state.damage + add);
      }

      // update car transform
      carRoot.position.set(state.pos.x, 0, state.pos.z);
      carRoot.rotationQuaternion = BABYLON.Quaternion.FromEulerAngles(0, state.yaw, 0);

      // wheel spin (visual)
      const spin = speedNow * dt * 2.2;
      wh1.rotation.x += spin; wh2.rotation.x += spin; wh3.rotation.x += spin; wh4.rotation.x += spin;

      // UI
      const kmh = Math.round(speedNow * 6.5); // just for feel
      spdEl.textContent = kmh + " km/h";

      // camera follow (smooth)
      const camTarget = carRoot.position.add(new BABYLON.Vector3(0, 3.8, 0));
      const back = new BABYLON.Vector3(-Math.sin(state.yaw), 0, -Math.cos(state.yaw)).scale(16);
      const camPos = camTarget.add(back).add(new BABYLON.Vector3(0, 10, 0));
      camera.position = BABYLON.Vector3.Lerp(camera.position, camPos, 0.10);
      camera.setTarget(BABYLON.Vector3.Lerp(camera.getTarget(), camTarget, 0.18));
    });

    resetCar();

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());
  })();
  </script>
</body>
</html>
