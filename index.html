<!DOCTYPE html>
<html>
<head>
<title>Dodge Game</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#222;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Dodge Game</h1>
<h2>Score : <span id="score">0</span></h2>

<canvas id="game" width="400" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let player = {
x:180,
y:450,
w:40,
h:40
}

let blocks = []
let score = 0
let speed = 3

document.addEventListener("keydown", e => {

if(e.key == "ArrowLeft"){
player.x -= 20
}

if(e.key == "ArrowRight"){
player.x += 20
}

})

function spawnBlock(){

blocks.push({
x:Math.random()*360,
y:-20,
w:40,
h:40
})

}

setInterval(spawnBlock,1000)

function gameLoop(){

ctx.clearRect(0,0,400,500)

ctx.fillStyle="cyan"
ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.fillStyle="red"

for(let i=0;i<blocks.length;i++){

let b = blocks[i]

b.y += speed

ctx.fillRect(b.x,b.y,b.w,b.h)

if(
player.x < b.x + b.w &&
player.x + player.w > b.x &&
player.y < b.y + b.h &&
player.y + player.h > b.y
){
alert("Game Over ! Score : "+score)
location.reload()
}

if(b.y > 500){
score++
document.getElementById("score").innerText = score
blocks.splice(i,1)
}

}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
