<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Car Physics Only (SAFE)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#87ceeb;font-family:Arial}
    canvas{width:100%;height:100%;display:block}
    #ui{
      position:fixed;left:14px;top:14px;z-index:10;
      background:rgba(10,14,22,.55);color:#fff;
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;padding:10px 12px;backdrop-filter: blur(10px);
      min-width:260px
    }
    .row{display:flex;justify-content:space-between;margin-top:6px;font-size:13px}
    .bar{height:10px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;margin-top:6px}
    .fill{height:100%;width:100%;transform-origin:left;transform:scaleX(0);
      background:linear-gradient(90deg,#64ff9a,#ffd166,#ff4d4d)}
    button{
      margin-top:8px;width:100%;border:none;cursor:pointer;border-radius:12px;
      padding:10px 12px;font-weight:900;background:rgba(0,0,0,.35);color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }
    .muted{opacity:.9;font-size:12px;line-height:1.35;margin-top:8px}
    .kbd{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:900;padding:2px 6px;border-radius:8px;
      background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.16)}
    #err{
      position:fixed;left:14px;bottom:14px;right:14px;z-index:9999;
      background:rgba(0,0,0,.7);color:#ffb3b3;border:1px solid rgba(255,255,255,.18);
      border-radius:14px;padding:10px 12px;white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;
      display:none;max-height:35vh;overflow:auto;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="ui">
    <div style="font-weight:900">Car Physics Only ☀️ (SAFE)</div>
    <div class="row"><span>Speed</span><b id="spd">0</b></div>
    <div class="row"><span>Damage</span><b id="dmg">0%</b></div>
    <div class="bar"><div class="fill" id="dmgFill"></div></div>
    <button id="reset">Reset (R)</button>
    <div class="muted">
      <span class="kbd">W</span> accel • <span class="kbd">S</span> brake/rev •
      <span class="kbd">A/D</span> steer • <span class="kbd">Space</span> handbrake<br>
      <span class="kbd">Mouse</span> rotate cam • <span class="kbd">Wheel</span> zoom
    </div>
  </div>

  <div id="err"></div>

  <!-- THREE + OrbitControls (non-module) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- CANNON classic (ultra compatible) -->
  <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>

  <script>
  (function(){
    const errBox = document.getElementById("err");
    function showErr(e){
      errBox.style.display = "block";
      errBox.textContent = "ERREUR JS:\n" + (e && e.stack ? e.stack : String(e));
    }
    window.addEventListener("error", (ev)=> showErr(ev.error || ev.message));
    window.addEventListener("unhandledrejection", (ev)=> showErr(ev.reason));

    try {
      // Quick sanity checks
      if(!window.THREE) throw new Error("THREE not loaded");
      if(!THREE.OrbitControls) throw new Error("OrbitControls not loaded");
      if(!window.CANNON) throw new Error("CANNON not loaded");

      const canvas = document.getElementById("c");
      const spdEl = document.getElementById("spd");
      const dmgEl = document.getElementById("dmg");
      const dmgFill = document.getElementById("dmgFill");
      const resetBtn = document.getElementById("reset");
      const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));

      // --- THREE
      const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.shadowMap.enabled = true;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);

      const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1500);
      camera.position.set(-10, 7, -12);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 1.6, 0);
      controls.minDistance = 5;
      controls.maxDistance = 55;
      controls.maxPolarAngle = Math.PI * 0.48;

      const sun = new THREE.DirectionalLight(0xffffff, 2.3);
      sun.position.set(60, 120, -60);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048,2048);
      scene.add(sun);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x88aa88, 1.1));

      // ground visual
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(500, 500),
        new THREE.MeshStandardMaterial({color: 0x4b4b50, roughness:1})
      );
      ground.rotation.x = -Math.PI/2;
      ground.receiveShadow = true;
      scene.add(ground);

      // --- CANNON (classic)
      const world = new CANNON.World();
      world.gravity.set(0, -9.82, 0);
      world.broadphase = new CANNON.SAPBroadphase(world);
      world.solver.iterations = 10;

      const groundMat = new CANNON.Material("ground");
      const carMat = new CANNON.Material("car");
      world.addContactMaterial(new CANNON.ContactMaterial(carMat, groundMat, {
        friction: 0.9, restitution: 0.02
      }));

      const groundBody = new CANNON.Body({ mass: 0, material: groundMat });
      groundBody.addShape(new CANNON.Plane());
      groundBody.quaternion.setFromEuler(-Math.PI/2, 0, 0);
      world.addBody(groundBody);

      // Simple obstacles (just 3 blocks)
      function addBlock(x,y,z,sx,sy,sz){
        const b = new CANNON.Body({ mass:0, material: groundMat });
        b.addShape(new CANNON.Box(new CANNON.Vec3(sx/2,sy/2,sz/2)));
        b.position.set(x, y+sy/2, z);
        world.addBody(b);

        const m = new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),
          new THREE.MeshStandardMaterial({color:0xb22a2a, roughness:0.9}));
        m.castShadow = true; m.receiveShadow = true;
        scene.add(m);

        return {b,m};
      }
      const obs = [
        addBlock(0,0,35, 10,10,10),
        addBlock(18,0,20, 8,14,8),
        addBlock(-18,0,18, 8,14,8),
      ];

      // --- Car (RaycastVehicle)
      const chassisBody = new CANNON.Body({ mass: 220, material: carMat });
      const chassisShape = new CANNON.Box(new CANNON.Vec3(1.25, 0.45, 2.2));
      chassisBody.addShape(chassisShape, new CANNON.Vec3(0, -0.15, 0)); // lower COM
      chassisBody.position.set(0, 2.5, 0);
      chassisBody.angularDamping = 0.55;
      world.addBody(chassisBody);

      const vehicle = new CANNON.RaycastVehicle({
        chassisBody,
        indexRightAxis: 0,
        indexUpAxis: 1,
        indexForwardAxis: 2
      });

      const wheelOpts = {
        radius: 0.45,
        directionLocal: new CANNON.Vec3(0, -1, 0),
        suspensionStiffness: 42,
        suspensionRestLength: 0.33,
        frictionSlip: 5.2,
        dampingRelaxation: 3.2,
        dampingCompression: 4.8,
        maxSuspensionForce: 140000,
        rollInfluence: 0.03,
        axleLocal: new CANNON.Vec3(1, 0, 0),
        chassisConnectionPointLocal: new CANNON.Vec3(),
        maxSuspensionTravel: 0.35,
        customSlidingRotationalSpeed: -30,
        useCustomSlidingRotationalSpeed: true
      };

      const pts = [
        [-1.05, 0.05,  1.65],
        [ 1.05, 0.05,  1.65],
        [-1.05, 0.05, -1.55],
        [ 1.05, 0.05, -1.55],
      ];
      for(let i=0;i<4;i++){
        wheelOpts.chassisConnectionPointLocal.set(pts[i][0], pts[i][1], pts[i][2]);
        vehicle.addWheel(Object.assign({}, wheelOpts));
      }
      vehicle.addToWorld(world);

      // --- Visual car
      const car = new THREE.Group(); scene.add(car);
      const paint = new THREE.MeshStandardMaterial({color:0x1aa6ff, roughness:0.65});
      const dark  = new THREE.MeshStandardMaterial({color:0x111111, roughness:1});
      const glass = new THREE.MeshStandardMaterial({color:0x0b1a2a, transparent:true, opacity:0.55});

      const bodyMain = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.9, 4.6), paint);
      bodyMain.castShadow = true; car.add(bodyMain);
      const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.75, 2.4), paint);
      cabin.position.set(0,0.6,-0.25); cabin.castShadow = true; car.add(cabin);
      const win = new THREE.Mesh(new THREE.BoxGeometry(1.75, 0.42, 1.75), glass);
      win.position.set(0,0.68,-0.25); car.add(win);

      function part(size,pos){
        const m = new THREE.Mesh(new THREE.BoxGeometry(size[0],size[1],size[2]), paint);
        m.position.set(pos[0],pos[1],pos[2]);
        m.castShadow = true; car.add(m);
        return m;
      }
      const parts = {
        hood:    part([2.4,0.18,1.55], [0, 0.18,  1.35]),
        bumperF: part([2.6,0.35,0.55], [0,-0.12,  2.55]),
        bumperB: part([2.6,0.35,0.55], [0,-0.12, -2.55]),
        doorL:   part([0.18,0.65,1.6], [-1.35,0.06,-0.25]),
        doorR:   part([0.18,0.65,1.6], [ 1.35,0.06,-0.25]),
        trunk:   part([2.4,0.18,1.2 ], [0, 0.18, -2.05]),
      };

      const wheelMeshes = [];
      for(let i=0;i<4;i++){
        const w = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,0.35,20), dark);
        w.rotation.z = Math.PI/2;
        w.castShadow = true;
        scene.add(w);
        wheelMeshes.push(w);
      }

      // Input
      const keys = new Set();
      addEventListener("keydown", e => { keys.add(e.key.toLowerCase()); if(e.key.toLowerCase()==="r") reset(); });
      addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));
      resetBtn.onclick = reset;

      // Damage (simple but effective)
      let damage = 0;
      function setDamage(v){
        damage = clamp(v, 0, 100);
        dmgEl.textContent = Math.round(damage) + "%";
        dmgFill.style.transform = "scaleX("+(damage/100)+")";
        parts.hood.scale.z    = clamp(1 - damage/160, 0.55, 1);
        parts.bumperF.scale.z = clamp(1 - damage/120, 0.45, 1);
        parts.bumperB.scale.z = clamp(1 - damage/150, 0.55, 1);
      }

      chassisBody.addEventListener("collide", (e)=>{
        const ov = (e.body && e.body.velocity) ? e.body.velocity : new CANNON.Vec3(0,0,0);
        const rvx = chassisBody.velocity.x - ov.x;
        const rvy = chassisBody.velocity.y - ov.y;
        const rvz = chassisBody.velocity.z - ov.z;
        const rel = Math.sqrt(rvx*rvx + rvy*rvy + rvz*rvz);
        const impact = rel * 12;
        if(impact > 22) setDamage(damage + (impact-22)*0.20);
      });

      // Drive tuning
      const maxSteer = 0.55;
      const engine = 14000;
      const brake = 95;

      function drive(){
        const f = keys.has("w");
        const b = keys.has("s");
        const l = keys.has("a");
        const r = keys.has("d");
        const hb = keys.has(" ");

        let steer = 0;
        if(l) steer += 1;
        if(r) steer -= 1;
        steer *= maxSteer;
        vehicle.setSteeringValue(steer, 0);
        vehicle.setSteeringValue(steer, 1);

        let force = 0;
        if(f) force = -engine;
        if(b) force = engine*0.65;
        vehicle.applyEngineForce(force, 2);
        vehicle.applyEngineForce(force, 3);

        const br = (hb ? brake : 0) + (!f && !b ? 8 : 0);
        for(let i=0;i<4;i++) vehicle.setBrake(br, i);
      }

      function reset(){
        setDamage(0);
        chassisBody.position.set(0, 2.5, 0);
        chassisBody.velocity.set(0,0,0);
        chassisBody.angularVelocity.set(0,0,0);
        chassisBody.quaternion.set(0,0,0,1);
        controls.target.set(0,1.6,0);
        camera.position.set(-10,7,-12);
      }

      reset();

      // Loop
      let last = performance.now();
      function tick(){
        requestAnimationFrame(tick);
        const now = performance.now();
        const dt = Math.min((now-last)/1000, 1/30);
        last = now;

        drive();
        world.step(1/60, dt, 3);

        // sync obstacles visuals
        for(const o of obs){
          o.m.position.copy(o.b.position);
          o.m.quaternion.copy(o.b.quaternion);
        }

        // sync car
        car.position.copy(chassisBody.position);
        car.quaternion.copy(chassisBody.quaternion);

        // sync wheels
        for(let i=0;i<vehicle.wheelInfos.length;i++){
          vehicle.updateWheelTransform(i);
          const wt = vehicle.wheelInfos[i].worldTransform;
          wheelMeshes[i].position.copy(wt.position);
          wheelMeshes[i].quaternion.copy(wt.quaternion);
        }

        // speed UI
        const v = chassisBody.velocity;
        const sp = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
        spdEl.textContent = Math.round(sp*3.6) + " km/h";

        controls.target.lerp(new THREE.Vector3(car.position.x, car.position.y+1.4, car.position.z), 0.14);
        controls.update();
        renderer.render(scene, camera);
      }
      tick();

      addEventListener("resize", ()=>{
        renderer.setSize(innerWidth, innerHeight);
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
      });

    } catch(e) {
      showErr(e);
    }
  })();
  </script>
</body>
</html>
