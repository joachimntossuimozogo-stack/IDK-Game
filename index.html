<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CrashDrive 3D (Fast + FreeCam + Parts)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#87ceeb;font-family:Arial}
    #renderCanvas{width:100%;height:100%;touch-action:none;display:block}
    #ui{
      position:fixed;left:14px;top:14px;z-index:10;
      background:rgba(10,14,22,.55);color:#fff;
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;padding:10px 12px;backdrop-filter: blur(10px);
      min-width:330px
    }
    .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-top:6px}
    .bar{height:10px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;margin-top:6px}
    .fill{height:100%;width:100%;transform-origin:left;transform:scaleX(0);
      background:linear-gradient(90deg,#64ff9a,#ffd166,#ff4d4d)}
    .muted{opacity:.9;font-size:12px;line-height:1.35;margin-top:8px}
    button{
      margin-top:8px;width:100%;border:none;cursor:pointer;border-radius:12px;
      padding:10px 12px;font-weight:900;background:rgba(0,0,0,.35);color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }
    button:active{transform:translateY(1px)}
    .pill{
      display:inline-flex;gap:6px;align-items:center;
      padding:5px 8px;border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;margin-top:8px
    }
    .kbd{
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-weight:900;padding:2px 6px;border-radius:8px;
      background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.16)
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="ui">
    <div style="font-weight:900;letter-spacing:.2px">CrashDrive 3D ☀️ FAST + FREECAM</div>
    <div class="row"><span>Speed</span><b id="spd">0</b></div>
    <div class="row"><span>Damage</span><b id="dmg">0%</b></div>
    <div class="bar"><div class="fill" id="dmgFill"></div></div>
    <div class="row"><span>Cam</span><b id="camMode">FOLLOW</b></div>
    <button id="reset">Reset (R)</button>

    <div class="muted">
      <span class="pill"><span class="kbd">W</span> accel</span>
      <span class="pill"><span class="kbd">S</span> brake/reverse</span>
      <span class="pill"><span class="kbd">A/D</span> turn</span>
      <span class="pill"><span class="kbd">Space</span> handbrake</span><br>
      <span class="pill"><span class="kbd">C</span> toggle FREE CAM</span>
      <span class="pill">FREE CAM: <span class="kbd">↑↓←→</span> move + mouse to look</span><br>
      💥 Gros chocs = pièces qui se détachent (capot/portes/pare-chocs).
    </div>
  </div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>

  <script>
  (() => {
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { antialias:true });

    const spdEl = document.getElementById("spd");
    const dmgEl = document.getElementById("dmg");
    const dmgFill = document.getElementById("dmgFill");
    const resetBtn = document.getElementById("reset");
    const camModeEl = document.getElementById("camMode");

    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const lerp=(a,b,t)=>a+(b-a)*t;

    const keys = new Set();
    window.addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      keys.add(k);
      if(k==="r") resetCar();
      if(k==="c") toggleCam();
    });
    window.addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));

    // ===== Scene
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.53, 0.81, 0.92, 1);

    // Sun + skylight
    const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.45, -1, 0.25), scene);
    sun.position = new BABYLON.Vector3(100, 160, -80);
    sun.intensity = 2.8;

    const skyLight = new BABYLON.HemisphericLight("sky", new BABYLON.Vector3(0, 1, 0), scene);
    skyLight.intensity = 1.25;

    // Visible sun disc
    const sunDisc = BABYLON.MeshBuilder.CreateDisc("sunDisc", { radius: 24, tessellation: 64 }, scene);
    sunDisc.position = new BABYLON.Vector3(160, 130, -220);
    sunDisc.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
    const sunMat = new BABYLON.StandardMaterial("sunMat", scene);
    sunMat.emissiveColor = new BABYLON.Color3(1, 0.95, 0.6);
    sunMat.disableLighting = true;
    sunDisc.material = sunMat;

    // ===== Map (cleaner)
    const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 1000, height: 1000 }, scene);
    const gmat = new BABYLON.StandardMaterial("gmat", scene);
    gmat.diffuseColor = new BABYLON.Color3(0.16, 0.60, 0.22);
    gmat.specularColor = new BABYLON.Color3(0,0,0);
    ground.material = gmat;

    // Big road cross
    function makeRoad(w,h, y=0.01){
      const r = BABYLON.MeshBuilder.CreateGround("road", { width:w, height:h }, scene);
      r.position.y = y;
      const rm = new BABYLON.StandardMaterial("rmat"+Math.random(), scene);
      rm.diffuseColor = new BABYLON.Color3(0.22,0.22,0.24);
      rm.specularColor = new BABYLON.Color3(0,0,0);
      r.material = rm;
      return r;
    }
    makeRoad(900, 34);
    const road2 = makeRoad(34, 900);
    road2.position.y = 0.011;

    // Lane lines
    function laneLine(w,h, y=0.02){
      const l = BABYLON.MeshBuilder.CreateGround("line", { width:w, height:h }, scene);
      l.position.y = y;
      const lm = new BABYLON.StandardMaterial("lmat"+Math.random(), scene);
      lm.diffuseColor = new BABYLON.Color3(0.95,0.92,0.35);
      lm.specularColor = new BABYLON.Color3(0,0,0);
      l.material = lm;
      return l;
    }
    laneLine(820, 1.2);
    const ll2 = laneLine(1.2, 820);
    ll2.position.y = 0.021;

    // ===== Colliders (AABB)
    const colliders = [];
    function addCollider(mesh, pad=0.15){
      colliders.push({ mesh, pad });
      return mesh;
    }

    function makeBox(name, x,z, w,d,h, color){
      const m = BABYLON.MeshBuilder.CreateBox(name, { width:w, depth:d, height:h }, scene);
      m.position.set(x, h/2, z);
      const mat = new BABYLON.StandardMaterial(name+"_mat", scene);
      mat.diffuseColor = BABYLON.Color3.FromHexString(color);
      mat.specularColor = new BABYLON.Color3(0,0,0);
      m.material = mat;
      return m;
    }

    // Boundaries
    addCollider(makeBox("B1", 0, -490, 1000, 10, 10, "#c03b3b"), 0.0);
    addCollider(makeBox("B2", 0,  490, 1000, 10, 10, "#c03b3b"), 0.0);
    addCollider(makeBox("B3",-490, 0, 10, 1000, 10, "#c03b3b"), 0.0);
    addCollider(makeBox("B4", 490, 0, 10, 1000, 10, "#c03b3b"), 0.0);

    // Buildings rows (city vibe)
    for(let i=0;i<40;i++){
      const side = (i%2===0) ? -220 : 220;
      const x = -420 + (i%20)*44;
      const z = side + (Math.random()*70-35);
      const h = 18 + Math.random()*34;
      addCollider(makeBox("BLD"+i, x, z, 30, 30, h, "#9b3a3a"), 0.2);
    }
    for(let i=0;i<40;i++){
      const side = (i%2===0) ? -220 : 220;
      const z = -420 + (i%20)*44;
      const x = side + (Math.random()*70-35);
      const h = 18 + Math.random()*34;
      addCollider(makeBox("BLD2_"+i, x, z, 30, 30, h, "#a33b3b"), 0.2);
    }

    // Crash test zone (blocks)
    for(let i=0;i<36;i++){
      const x = 260 + (i%9)*16;
      const z = 260 + Math.floor(i/9)*16;
      addCollider(makeBox("CB"+i, x, z, 9, 9, 9, "#b22a2a"), 0.05);
    }

    // Walls arena
    addCollider(makeBox("W1", 320, 0, 10, 240, 12, "#b22a2a"));
    addCollider(makeBox("W2", 400, 0, 10, 240, 12, "#b22a2a"));
    addCollider(makeBox("W3", 360,-120, 120, 10, 12, "#b22a2a"));
    addCollider(makeBox("W4", 360, 120, 120, 10, 12, "#b22a2a"));

    // Ramps
    function ramp(x,z,w,d,tiltDeg){
      const m = BABYLON.MeshBuilder.CreateBox("ramp", { width:w, depth:d, height:2 }, scene);
      m.position.set(x, 1, z);
      m.rotation.x = BABYLON.Tools.ToRadians(tiltDeg);
      const mat = new BABYLON.StandardMaterial("rampMat"+Math.random(), scene);
      mat.diffuseColor = new BABYLON.Color3(0.25,0.35,0.9);
      mat.specularColor = new BABYLON.Color3(0,0,0);
      m.material = mat;
      addCollider(m, 0.0);
      return m;
    }
    ramp(80, 120, 46, 20, -18);
    ramp(-120, -80, 40, 18, -16);
    ramp(420, 200, 56, 22, -22);

    // ===== Car (more detailed + detachable parts)
    const carRoot = new BABYLON.TransformNode("carRoot", scene);

    const carMat = new BABYLON.StandardMaterial("carMat", scene);
    carMat.diffuseColor = new BABYLON.Color3(0.10, 0.65, 1.0);
    carMat.specularColor = new BABYLON.Color3(0.22,0.22,0.22);

    const metalMat = new BABYLON.StandardMaterial("metalMat", scene);
    metalMat.diffuseColor = new BABYLON.Color3(0.12,0.12,0.12);
    metalMat.specularColor = new BABYLON.Color3(0.1,0.1,0.1);

    const glassMat = new BABYLON.StandardMaterial("glassMat", scene);
    glassMat.diffuseColor = new BABYLON.Color3(0.04,0.07,0.12);
    glassMat.alpha = 0.62;
    glassMat.specularColor = new BABYLON.Color3(0.0,0.0,0.0);

    // Core body
    const chassis = BABYLON.MeshBuilder.CreateBox("chassis", { width:2.8, height:0.75, depth:4.8 }, scene);
    chassis.parent = carRoot;
    chassis.position.y = 1.05;
    chassis.material = carMat;

    const cabin = BABYLON.MeshBuilder.CreateBox("cabin", { width:2.0, height:0.65, depth:2.4 }, scene);
    cabin.parent = carRoot;
    cabin.position.set(0, 1.55, -0.35);
    cabin.material = carMat;

    const windows = BABYLON.MeshBuilder.CreateBox("windows", { width:1.75, height:0.38, depth:1.7 }, scene);
    windows.parent = carRoot;
    windows.position.set(0, 1.65, -0.35);
    windows.material = glassMat;

    // Wheel helper
    const wheelMat = new BABYLON.StandardMaterial("wheelMat", scene);
    wheelMat.diffuseColor = new BABYLON.Color3(0.04,0.04,0.04);

    function wheel(x,z){
      const w = BABYLON.MeshBuilder.CreateCylinder("wheel", { diameter:0.95, height:0.35, tessellation:20 }, scene);
      w.rotation.z = Math.PI/2;
      w.parent = carRoot;
      w.position.set(x, 0.62, z);
      w.material = wheelMat;

      // rim (detail)
      const rim = BABYLON.MeshBuilder.CreateCylinder("rim", { diameter:0.55, height:0.36, tessellation:18 }, scene);
      rim.rotation.z = Math.PI/2;
      rim.parent = w;
      rim.position.set(0,0,0);
      rim.material = metalMat;
      rim.scaling.y = 0.9;

      return w;
    }
    const wh1 = wheel(-1.25,  1.85);
    const wh2 = wheel( 1.25,  1.85);
    const wh3 = wheel(-1.25, -1.85);
    const wh4 = wheel( 1.25, -1.85);

    // Lights
    function headLight(x,z){
      const s = BABYLON.MeshBuilder.CreateSphere("hl", { diameter:0.22 }, scene);
      s.parent = carRoot;
      s.position.set(x, 0.95, z);
      const m = new BABYLON.StandardMaterial("hlm"+Math.random(), scene);
      m.emissiveColor = new BABYLON.Color3(1,1,0.85);
      m.disableLighting = true;
      s.material = m;
    }
    headLight(-0.9, 2.75);
    headLight( 0.9, 2.75);

    // ===== Detachable parts list
    const detachable = [];
    const detachedParts = []; // {mesh, vel, angVel}

    function makePart(name, w,h,d, px,py,pz){
      const p = BABYLON.MeshBuilder.CreateBox(name, { width:w, height:h, depth:d }, scene);
      p.parent = carRoot;
      p.position.set(px,py,pz);
      p.material = carMat;
      detachable.push({ mesh:p, name, detached:false });
      return p;
    }

    // Parts (BeamNG-like)
    const hood    = makePart("hood",    2.4, 0.20, 1.5, 0, 1.15,  1.45);
    const trunk   = makePart("trunk",   2.4, 0.20, 1.2, 0, 1.15, -2.05);
    const bumpF   = makePart("bumpF",   2.5, 0.35, 0.55,0, 0.90,  2.65);
    const bumpB   = makePart("bumpB",   2.5, 0.35, 0.55,0, 0.90, -2.65);
    const doorL   = makePart("doorL",   0.20,0.55, 1.5,-1.45,1.10,-0.25);
    const doorR   = makePart("doorR",   0.20,0.55, 1.5, 1.45,1.10,-0.25);

    function detachPart(partMesh, impulseDir, power){
      if(!partMesh || !partMesh.parent) return;

      // keep world transform
      partMesh.computeWorldMatrix(true);
      const wp = partMesh.getAbsolutePosition().clone();
      const wr = partMesh.rotationQuaternion
        ? partMesh.rotationQuaternion.clone()
        : BABYLON.Quaternion.FromEulerAngles(partMesh.rotation.x, partMesh.rotation.y, partMesh.rotation.z);

      partMesh.setParent(null);
      partMesh.position.copyFrom(wp);
      partMesh.rotationQuaternion = wr;

      // give it velocity + spin
      const vel = impulseDir.scale(power).add(new BABYLON.Vector3((Math.random()-0.5)*2, 2.5, (Math.random()-0.5)*2));
      const angVel = new BABYLON.Vector3((Math.random()-0.5)*6, (Math.random()-0.5)*6, (Math.random()-0.5)*6);

      detachedParts.push({ mesh:partMesh, vel, angVel });
    }

    // ===== Driving state (faster)
    const state = {
      pos: new BABYLON.Vector3(0,0,0),
      vel: new BABYLON.Vector3(0,0,0),
      yaw: 0,
      damage: 0,
      lastSpeed: 0
    };

    function setDamage(v){
      state.damage = clamp(v, 0, 100);
      dmgEl.textContent = Math.round(state.damage) + "%";
      dmgFill.style.transform = `scaleX(${state.damage/100})`;

      // paint gets worse
      const tint = 1 - state.damage/170;
      carMat.diffuseColor = new BABYLON.Color3(0.10*tint, 0.65*tint, 1.0*tint);

      // fake deformation (front/back squish)
      bumpF.scaling.z = clamp(1 - state.damage/160, 0.65, 1);
      hood.scaling.z  = clamp(1 - state.damage/220, 0.80, 1);
      bumpB.scaling.z = clamp(1 - state.damage/190, 0.70, 1);
      trunk.scaling.z = clamp(1 - state.damage/240, 0.84, 1);
    }

    function resetCar(){
      state.pos.set(0,0,0);
      state.vel.set(0,0,0);
      state.yaw = 0;
      state.lastSpeed = 0;
      setDamage(0);

      // reattach any detached parts (clean reset)
      detachedParts.forEach(p => p.mesh.dispose());
      detachedParts.length = 0;

      // recreate parts cleanly (simple + safe)
      // (reload page-style but without reloading)
      detachable.forEach(d => { if(d.mesh && !d.mesh.isDisposed()) d.mesh.dispose(); });
      detachable.length = 0;

      // rebuild detachable parts
      function rebuildPart(name,w,h,d,px,py,pz){
        const p = BABYLON.MeshBuilder.CreateBox(name, { width:w, height:h, depth:d }, scene);
        p.parent = carRoot;
        p.position.set(px,py,pz);
        p.material = carMat;
        detachable.push({ mesh:p, name, detached:false });
        return p;
      }
      // assign globals again
      window.__parts = {};
      window.__parts.hood  = rebuildPart("hood", 2.4,0.20,1.5, 0,1.15, 1.45);
      window.__parts.trunk = rebuildPart("trunk",2.4,0.20,1.2, 0,1.15,-2.05);
      window.__parts.bumpF = rebuildPart("bumpF",2.5,0.35,0.55,0,0.90, 2.65);
      window.__parts.bumpB = rebuildPart("bumpB",2.5,0.35,0.55,0,0.90,-2.65);
      window.__parts.doorL = rebuildPart("doorL",0.20,0.55,1.5,-1.45,1.10,-0.25);
      window.__parts.doorR = rebuildPart("doorR",0.20,0.55,1.5, 1.45,1.10,-0.25);

      // also update refs used later
      // (we’ll read from window.__parts inside loop)
      carRoot.position.set(0,0,0);
      carRoot.rotationQuaternion = BABYLON.Quaternion.FromEulerAngles(0,0,0);
    }

    resetBtn.onclick = resetCar;

    // ===== Collision helpers
    function getAABB(mesh, pad=0){
      mesh.computeWorldMatrix(true);
      const bb = mesh.getBoundingInfo().boundingBox;
      const min = bb.minimumWorld.clone();
      const max = bb.maximumWorld.clone();
      min.x -= pad; min.z -= pad;
      max.x += pad; max.z += pad;
      return {min,max};
    }
    function circleAABBResolve(cx, cz, r, aabb){
      const x = clamp(cx, aabb.min.x, aabb.max.x);
      const z = clamp(cz, aabb.min.z, aabb.max.z);
      const dx = cx - x;
      const dz = cz - z;
      const d2 = dx*dx + dz*dz;
      if(d2 > r*r) return null;
      const d = Math.sqrt(d2) || 0.0001;
      const nx = dx / d;
      const nz = dz / d;
      const push = r - d;
      return { nx, nz, push };
    }

    // ===== Camera modes
    let freeCam = false;

    // follow cam uses ArcRotate (you can rotate freely)
    const followCam = new BABYLON.ArcRotateCamera("followCam",
      BABYLON.Tools.ToRadians(210), BABYLON.Tools.ToRadians(65),
      22, new BABYLON.Vector3(0,3,0), scene);
    followCam.attachControl(canvas, true);
    followCam.lowerRadiusLimit = 10;
    followCam.upperRadiusLimit = 40;
    followCam.wheelDeltaPercentage = 0.01;
    followCam.panningSensibility = 80;

    // free cam (FPS camera) uses arrows to move so WASD stays for car
    const free = new BABYLON.UniversalCamera("freeCam", new BABYLON.Vector3(0, 12, -25), scene);
    free.setTarget(new BABYLON.Vector3(0, 4, 0));
    free.attachControl(canvas, true);
    free.speed = 1.0;
    free.keysUp = [38];    // ArrowUp
    free.keysDown = [40];  // ArrowDown
    free.keysLeft = [37];  // ArrowLeft
    free.keysRight = [39]; // ArrowRight

    scene.activeCamera = followCam;
    camModeEl.textContent = "FOLLOW";

    function toggleCam(){
      freeCam = !freeCam;
      if(freeCam){
        scene.activeCamera = free;
        camModeEl.textContent = "FREE";
        // start free cam near car
        free.position = carRoot.position.add(new BABYLON.Vector3(0, 10, -20));
        free.setTarget(carRoot.position.add(new BABYLON.Vector3(0, 3, 0)));
      }else{
        scene.activeCamera = followCam;
        camModeEl.textContent = "FOLLOW";
        followCam.target = carRoot.position.add(new BABYLON.Vector3(0, 3, 0));
      }
      scene.activeCamera.attachControl(canvas, true);
    }

    // ===== Loop
    const carRadius = 1.8;
    let lastDetachCheck = 0;

    scene.onBeforeRenderObservable.add(() => {
      const dt = scene.getEngine().getDeltaTime()/1000;

      // ===== Car controls (FAST)
      const up = keys.has("w") || keys.has("arrowup");
      const down = keys.has("s") || keys.has("arrowdown");
      const left = keys.has("a") || keys.has("arrowleft");
      const right = keys.has("d") || keys.has("arrowright");
      const hand = keys.has(" ");

      const fx = Math.sin(state.yaw);
      const fz = Math.cos(state.yaw);

      // SPEED BOOST
      const maxSpeed = 95;          // MUCH faster
      const accel = hand ? 0 : 90;  // big accel
      const brake = 80;
      const friction = hand ? 2.0 : 4.2;
      const turn = 3.2;

      if(up){
        state.vel.x += fx * accel * dt;
        state.vel.z += fz * accel * dt;
      }
      if(down){
        state.vel.x -= fx * brake * dt;
        state.vel.z -= fz * brake * dt;
      }

      let steer = 0;
      if(left) steer -= 1;
      if(right) steer += 1;

      const speedForTurn = clamp((Math.hypot(state.vel.x, state.vel.z)/12), 0.25, 1);
      state.yaw += steer * turn * speedForTurn * dt;

      // friction
      state.vel.x = lerp(state.vel.x, 0, friction*dt);
      state.vel.z = lerp(state.vel.z, 0, friction*dt);

      // clamp speed
      const sp = Math.hypot(state.vel.x, state.vel.z);
      if(sp > maxSpeed){
        const s = maxSpeed / sp;
        state.vel.x *= s;
        state.vel.z *= s;
      }

      // move
      state.pos.x += state.vel.x * dt;
      state.pos.z += state.vel.z * dt;

      // collisions
      let hit = false;
      let hitN = {x:0,z:0};

      for(const c of colliders){
        const aabb = getAABB(c.mesh, c.pad);
        const res = circleAABBResolve(state.pos.x, state.pos.z, carRadius, aabb);
        if(!res) continue;

        state.pos.x += res.nx * res.push;
        state.pos.z += res.nz * res.push;

        const vn = state.vel.x*res.nx + state.vel.z*res.nz;
        if(vn < 0){
          state.vel.x -= 1.55 * vn * res.nx;
          state.vel.z -= 1.55 * vn * res.nz;
          hit = true;
          hitN = {x:res.nx, z:res.nz};
        }
      }

      const speedNow = Math.hypot(state.vel.x, state.vel.z);
      const drop = Math.max(0, state.lastSpeed - speedNow);
      state.lastSpeed = speedNow;

      // UI speed
      spdEl.textContent = Math.round(speedNow * 4.0) + " km/h";

      // damage + detach pieces
      if(hit){
        const impact = (drop*14) + (speedNow*0.20);
        if(impact > 6){
          setDamage(state.damage + impact * 0.16);
        }

        const now = performance.now();
        if(now - lastDetachCheck > 120){
          lastDetachCheck = now;

          // Detach thresholds (BeamNG vibe)
          const parts = window.__parts || {};
          const dir = new BABYLON.Vector3(hitN.x, 0.2, hitN.z).normalize();

          if(impact > 20 && parts.bumpF && parts.bumpF.parent){
            detachPart(parts.bumpF, dir, 10 + impact*0.25);
          }
          if(impact > 28 && parts.hood && parts.hood.parent){
            detachPart(parts.hood, dir, 11 + impact*0.28);
          }
          if(impact > 36 && parts.doorL && parts.doorL.parent){
            detachPart(parts.doorL, dir.add(new BABYLON.Vector3(-0.4,0,0)), 10 + impact*0.25);
          }
          if(impact > 40 && parts.doorR && parts.doorR.parent){
            detachPart(parts.doorR, dir.add(new BABYLON.Vector3(0.4,0,0)), 10 + impact*0.25);
          }
          if(impact > 46 && parts.bumpB && parts.bumpB.parent){
            detachPart(parts.bumpB, dir.scale(-1), 10 + impact*0.22);
          }
          if(impact > 52 && parts.trunk && parts.trunk.parent){
            detachPart(parts.trunk, dir.scale(-1), 11 + impact*0.22);
          }
        }
      }

      // apply transform
      carRoot.position.set(state.pos.x, 0, state.pos.z);
      carRoot.rotationQuaternion = BABYLON.Quaternion.FromEulerAngles(0, state.yaw, 0);

      // wheel spin
      const spin = speedNow * dt * 2.2;
      wh1.rotation.x += spin; wh2.rotation.x += spin; wh3.rotation.x += spin; wh4.rotation.x += spin;

      // follow cam target
      if(!freeCam){
        followCam.target = BABYLON.Vector3.Lerp(followCam.target, carRoot.position.add(new BABYLON.Vector3(0,3,0)), 0.18);
      }

      // update detached parts physics (simple gravity)
      for(const p of detachedParts){
        p.vel.y -= 9.81 * dt;
        p.mesh.position.addInPlace(p.vel.scale(dt));

        // spin
        p.mesh.rotation.x += p.angVel.x * dt;
        p.mesh.rotation.y += p.angVel.y * dt;
        p.mesh.rotation.z += p.angVel.z * dt;

        // ground collision
        if(p.mesh.position.y < 0.12){
          p.mesh.position.y = 0.12;
          p.vel.y *= -0.25; // little bounce
          p.vel.x *= 0.86;
          p.vel.z *= 0.86;
          p.angVel.scaleInPlace(0.92);
        }
      }
    });

    function detachPart(partMesh, impulseDir, power){
      if(!partMesh || !partMesh.parent) return;

      partMesh.computeWorldMatrix(true);
      const wp = partMesh.getAbsolutePosition().clone();

      const wr = partMesh.rotationQuaternion
        ? partMesh.rotationQuaternion.clone()
        : BABYLON.Quaternion.FromEulerAngles(partMesh.rotation.x, partMesh.rotation.y, partMesh.rotation.z);

      partMesh.setParent(null);
      partMesh.position.copyFrom(wp);
      partMesh.rotationQuaternion = wr;

      const vel = impulseDir.scale(power).add(new BABYLON.Vector3((Math.random()-0.5)*3, 3.2, (Math.random()-0.5)*3));
      const angVel = new BABYLON.Vector3((Math.random()-0.5)*7, (Math.random()-0.5)*7, (Math.random()-0.5)*7);

      detachedParts.push({ mesh:partMesh, vel, angVel });
    }

    resetCar(); // start

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

  })();
  </script>
</body>
