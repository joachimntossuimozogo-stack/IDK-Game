<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CrashDrive 3D (Bright)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#87ceeb;font-family:Arial}
    #renderCanvas{width:100%;height:100%;touch-action:none;display:block}
    #ui{
      position:fixed;left:14px;top:14px;z-index:10;
      background:rgba(10,14,22,.55);color:#fff;
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;padding:10px 12px;backdrop-filter: blur(10px);
      min-width:260px
    }
    .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-top:6px}
    .bar{height:10px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;margin-top:6px}
    .fill{height:100%;width:100%;transform-origin:left;transform:scaleX(0);
      background:linear-gradient(90deg,#64ff9a,#ffd166,#ff4d4d)}
    .muted{opacity:.9;font-size:12px;line-height:1.35;margin-top:8px}
    button{
      margin-top:8px;width:100%;border:none;cursor:pointer;border-radius:12px;
      padding:10px 12px;font-weight:900;background:rgba(0,0,0,.35);color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }
    button:active{transform:translateY(1px)}
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="ui">
    <div style="font-weight:900;letter-spacing:.2px">CrashDrive 3D ☀️</div>
    <div class="row"><span>Speed</span><b id="spd">0</b></div>
    <div class="row"><span>Damage</span><b id="dmg">0%</b></div>
    <div class="bar"><div class="fill" id="dmgFill"></div></div>
    <button id="reset">Reset (R)</button>
    <div class="muted">
      <b>W</b> accel • <b>S</b> brake/reverse • <b>A/D</b> turn • <b>Space</b> handbrake<br>
      ☀️ Sky bleu + gros soleil + map claire.
    </div>
  </div>

  <!-- Babylon + Ammo -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/ammo.js"></script>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });

    const spdEl = document.getElementById("spd");
    const dmgEl = document.getElementById("dmg");
    const dmgFill = document.getElementById("dmgFill");
    const resetBtn = document.getElementById("reset");

    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const keys = new Set();
    window.addEventListener("keydown", e => { keys.add(e.key.toLowerCase()); if(e.key.toLowerCase()==="r") resetCar(); });
    window.addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));

    let scene, carRoot, carImpostor, damage = 0;

    async function createScene(){
      scene = new BABYLON.Scene(engine);

      // ✅ Ciel bleu clair
      scene.clearColor = new BABYLON.Color4(0.53, 0.81, 0.92, 1);

      // ✅ Lumières : gros soleil + lumière du ciel
      const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.6, -1, 0.25), scene);
      sun.position = new BABYLON.Vector3(80, 140, -60);
      sun.intensity = 2.4; // SUPER BRIGHT

      const skyLight = new BABYLON.HemisphericLight("sky", new BABYLON.Vector3(0, 1, 0), scene);
      skyLight.intensity = 1.2;

      // ✅ “Soleil visible” (sprite simple)
      const sunDisc = BABYLON.MeshBuilder.CreateDisc("sunDisc", { radius: 18, tessellation: 64 }, scene);
      sunDisc.position = new BABYLON.Vector3(120, 110, -140);
      sunDisc.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
      const sunMat = new BABYLON.StandardMaterial("sunMat", scene);
      sunMat.emissiveColor = new BABYLON.Color3(1, 0.95, 0.6);
      sunMat.disableLighting = true;
      sunDisc.material = sunMat;

      // ✅ Physique
      const ammo = await Ammo();
      const plugin = new BABYLON.AmmoJSPlugin(true, ammo);
      scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), plugin);

      // ✅ Caméra 3e personne (bien)
      const camera = new BABYLON.FollowCamera("cam", new BABYLON.Vector3(0, 8, -18), scene);
      camera.radius = 18;
      camera.heightOffset = 7;
      camera.rotationOffset = 180;
      camera.cameraAcceleration = 0.08;
      camera.maxCameraSpeed = 10;

      // ✅ Sol clair (grande map)
      const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 600, height: 600 }, scene);
      const gmat = new BABYLON.StandardMaterial("gmat", scene);
      gmat.diffuseColor = new BABYLON.Color3(0.18, 0.55, 0.22); // vert herbe
      gmat.specularColor = new BABYLON.Color3(0,0,0);
      ground.material = gmat;

      ground.physicsImpostor = new BABYLON.PhysicsImpostor(
        ground, BABYLON.PhysicsImpostor.BoxImpostor,
        { mass: 0, restitution: 0.02, friction: 1.1 }, scene
      );

      // ✅ Route (ruban gris)
      const road = BABYLON.MeshBuilder.CreateGround("road", { width: 520, height: 22 }, scene);
      road.position.y = 0.01;
      const rmat = new BABYLON.StandardMaterial("rmat", scene);
      rmat.diffuseColor = new BABYLON.Color3(0.22,0.22,0.24);
      rmat.specularColor = new BABYLON.Color3(0,0,0);
      road.material = rmat;

      // ✅ Obstacles (murs + blocs + rampes)
      function box(x,z,w,d,h,color){
        const m = BABYLON.MeshBuilder.CreateBox("bx", { width:w, depth:d, height:h }, scene);
        m.position.set(x, h/2, z);
        const mat = new BABYLON.StandardMaterial("m", scene);
        mat.diffuseColor = BABYLON.Color3.FromHexString(color);
        mat.specularColor = new BABYLON.Color3(0,0,0);
        m.material = mat;
        m.physicsImpostor = new BABYLON.PhysicsImpostor(m, BABYLON.PhysicsImpostor.BoxImpostor,
          { mass:0, restitution:0.03, friction:1.0 }, scene);
        return m;
      }
      function ramp(x,z,w,d,tiltDeg){
        const m = BABYLON.MeshBuilder.CreateBox("rp", { width:w, depth:d, height:1 }, scene);
        m.position.set(x, 0.5, z);
        m.rotation.x = BABYLON.Tools.ToRadians(tiltDeg);
        const mat = new BABYLON.StandardMaterial("rm", scene);
        mat.diffuseColor = new BABYLON.Color3(0.25,0.35,0.9);
        m.material = mat;
        m.physicsImpostor = new BABYLON.PhysicsImpostor(m, BABYLON.PhysicsImpostor.BoxImpostor,
          { mass:0, restitution:0.02, friction:1.1 }, scene);
      }

      // borders
      box(0,-290,600,6,5,"#c03b3b");
      box(0, 290,600,6,5,"#c03b3b");
      box(-290,0,6,600,5,"#c03b3b");
      box( 290,0,6,600,5,"#c03b3b");

      // crash blocks
      for(let i=0;i<24;i++){
        const x = -160 + (i%6)*26;
        const z = -40 + Math.floor(i/6)*26;
        box(x,z,6,6,6,"#b22a2a");
      }

      // walls arena
      box(120, 0, 6, 140, 6, "#b22a2a");
      box(180, 0, 6, 140, 6, "#b22a2a");
      box(150,-70, 70, 6, 6, "#b22a2a");
      box(150, 70, 70, 6, 6, "#b22a2a");

      // ramps
      ramp(40, 60, 22, 12, -18);
      ramp(90,-40, 18, 10, -16);
      ramp(210, 120, 26, 12, -22);

      // ✅ Voiture plus stylée (châssis + toit + phares + roues)
      carRoot = new BABYLON.TransformNode("carRoot", scene);

      const chassis = BABYLON.MeshBuilder.CreateBox("chassis", { width:2.4, height:0.65, depth:4.2 }, scene);
      chassis.parent = carRoot;
      chassis.position.y = 1.7;

      const top = BABYLON.MeshBuilder.CreateBox("top", { width:1.8, height:0.55, depth:2.0 }, scene);
      top.parent = carRoot;
      top.position.y = 2.05;
      top.position.z = -0.4;

      const carMat = new BABYLON.StandardMaterial("carMat", scene);
      carMat.diffuseColor = new BABYLON.Color3(0.12, 0.65, 1.0); // bleu stylé
      carMat.specularColor = new BABYLON.Color3(0.2,0.2,0.2);
      chassis.material = carMat;
      top.material = carMat;

      // windows
      const win = BABYLON.MeshBuilder.CreateBox("win", { width:1.55, height:0.35, depth:1.4 }, scene);
      win.parent = carRoot;
      win.position.set(0, 2.1, -0.4);
      const wmat = new BABYLON.StandardMaterial("wmat", scene);
      wmat.diffuseColor = new BABYLON.Color3(0.05,0.08,0.12);
      wmat.alpha = 0.65;
      win.material = wmat;

      // headlights (emissive)
      function headLight(x,z){
        const l = BABYLON.MeshBuilder.CreateSphere("hl", { diameter:0.28 }, scene);
        l.parent = carRoot;
        l.position.set(x, 1.55, z);
        const lm = new BABYLON.StandardMaterial("lm", scene);
        lm.emissiveColor = new BABYLON.Color3(1,1,0.85);
        lm.diffuseColor = new BABYLON.Color3(0.2,0.2,0.2);
        l.material = lm;
      }
      headLight(-0.75, 2.05);
      headLight( 0.75, 2.05);

      // wheels
      const wheelMat = new BABYLON.StandardMaterial("wheelMat", scene);
      wheelMat.diffuseColor = new BABYLON.Color3(0.05,0.05,0.05);

      function wheel(x,z){
        const w = BABYLON.MeshBuilder.CreateCylinder("wheel", { diameter:0.85, height:0.35, tessellation:18 }, scene);
        w.rotation.z = Math.PI/2;
        w.parent = carRoot;
        w.position.set(x, 1.28, z);
        w.material = wheelMat;
      }
      wheel(-1.05,  1.55);
      wheel( 1.05,  1.55);
      wheel(-1.05, -1.55);
      wheel( 1.05, -1.55);

      // ✅ physics impostor on chassis (simple + marche)
      chassis.physicsImpostor = new BABYLON.PhysicsImpostor(
        chassis, BABYLON.PhysicsImpostor.BoxImpostor,
        { mass: 220, restitution: 0.02, friction: 1.2 }, scene
      );
      carImpostor = chassis.physicsImpostor;

      // keep visuals in sync (carRoot follows chassis)
      scene.onBeforeRenderObservable.add(() => {
        const p = chassis.getAbsolutePosition();
        carRoot.position.copyFrom(p);

        // rotate root with chassis rotation
        if(chassis.rotationQuaternion){
          carRoot.rotationQuaternion = chassis.rotationQuaternion.clone();
        }
        // offset because carRoot includes chassis itself
        chassis.position.y = 0; // keep at root
      });

      camera.lockedTarget = carRoot;

      // drive loop (impulses -> avance VRAIMENT)
      let lastSpeed = 0;
      scene.onBeforeRenderObservable.add(() => {
        if(!carImpostor) return;

        const dt = scene.getEngine().getDeltaTime() / 1000;

        const up = keys.has("w") || keys.has("arrowup");
        const down = keys.has("s") || keys.has("arrowdown");
        const left = keys.has("a") || keys.has("arrowleft");
        const right = keys.has("d") || keys.has("arrowright");
        const hand = keys.has(" ");

        // current velocity
        const v = carImpostor.getLinearVelocity() || new BABYLON.Vector3(0,0,0);
        const speed = v.length();
        spdEl.textContent = Math.round(speed * 3.6) + " km/h";

        // forward direction from root
        const forward = carRoot.forward.normalize();

        // engine impulse (bigger so it moves for sure)
        const engineImpulse = hand ? 0 : 18;
        const brakeImpulse  = 14;

        if(up){
          carImpostor.applyImpulse(forward.scale(engineImpulse), carRoot.getAbsolutePosition());
        }
        if(down){
          carImpostor.applyImpulse(forward.scale(-brakeImpulse), carRoot.getAbsolutePosition());
        }

        // steering torque
        const steer = (left ? 1 : 0) - (right ? 1 : 0);
        if(steer !== 0){
          carImpostor.applyTorque(new BABYLON.Vector3(0, steer * 5.5, 0));
        }

        // handbrake: slow down hard
        if(hand){
          carImpostor.setLinearVelocity(v.scale(0.985));
          carImpostor.setAngularVelocity((carImpostor.getAngularVelocity()||BABYLON.Vector3.Zero()).scale(0.96));
        }

        // damage when big speed drop (impact)
        const drop = Math.max(0, lastSpeed - speed);
        if(drop > 2.2){
          addDamage(drop * 6.5);
        }
        lastSpeed = speed;
      });

      function addDamage(x){
        damage = clamp(damage + x * 0.03, 0, 100);
        dmgEl.textContent = Math.round(damage) + "%";
        dmgFill.style.transform = `scaleX(${damage/100})`;

        // Fake deformation: compress front + darker paint
        const squash = clamp(1 - damage/160, 0.72, 1);
        top.scaling.z = squash;
        chassis.scaling.z = clamp(1 - damage/220, 0.85, 1);

        const tint = 1 - damage/180;
        carMat.diffuseColor = new BABYLON.Color3(0.12*tint, 0.65*tint, 1.0*tint);
      }

      // reset function
      window.resetCar = resetCar;
      function resetCar(){
        damage = 0;
        dmgEl.textContent = "0%";
        dmgFill.style.transform = "scaleX(0)";
        chassis.scaling.z = 1;
        top.scaling.z = 1;
        carMat.diffuseColor = new BABYLON.Color3(0.12, 0.65, 1.0);

        carImpostor.setLinearVelocity(BABYLON.Vector3.Zero());
        carImpostor.setAngularVelocity(BABYLON.Vector3.Zero());
        carRoot.position.set(0, 2, 0);
        carRoot.rotationQuaternion = BABYLON.Quaternion.Identity();
        // put chassis back under root
        chassis.position.set(0, 0, 0);
        chassis.rotationQuaternion = BABYLON.Quaternion.Identity();
      }
      resetBtn.onclick = resetCar;

      // start position
      resetCar();

      return scene;
    }

    createScene().then(s => {
      engine.runRenderLoop(() => s.render());
    });

    window.addEventListener("resize", () => engine.resize());
  </script>
</body>
</html>
